<svg xmlns="http://www.w3.org/2000/svg" id="mesh-gradient" 
	    width="1000" height="500" viewBox="0 0 1000 500" >
	        <defs>
	            <filter id="blur" filterUnits="userSpaceOnUse" x="0" y="0" width="1000" height="500">
	                <feGaussianBlur stdDeviation="80" />
	            </filter>
	            <filter id="noise" x="0" y="0" width="100%" height="100%">
				<feTurbulence type="fractalNoise" baseFrequency="1" octaves="3" result="turbulence" stitchTiles="stitch" />
				<feBlend in="SourceGraphic" in2="turbulence" mode="overlay" />
			</filter>
	        </defs>
	        <rect id="background" width="100%" height="100%" fill="#000" />
	        <g id="swatches" width="1000" height="500" filter="url(#blur)"><rect x="73.48179014510066" y="138.4615485858253" width="638.4110478666887" height="608.4275215039718" fill="#31A4CD" /><rect x="129.61667750055165" y="2.926686658014148" width="491.77485749563925" height="550.4853118858409" fill="#58F37F" /><rect x="-346.829519225359" y="-203.19272773097447" width="744.4181444167202" height="458.49395945737706" fill="#00D1C5" /><rect x="-61.283437334745" y="-56.76368507819663" width="478.53266451986" height="280.75527189445705" fill="#FFFF16" /></g>
	    	<rect x="0" y="0" width="1000" height="500" 
	    	style="mix-blend-mode: luminosity; filter: url(#noise); opacity: 15%"></rect>
    	</svg>